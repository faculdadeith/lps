  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }

    :root {
      --bg:           #eef1f7;
      --bg-soft:      #f1f4fa;
      --bg-card:      #ffffff;
      --line:         rgba(10,26,58,0.10);
      --line-strong:  rgba(10,26,58,0.18);
      --text:         #0a1a3a;
      --text-mute:    #45526b;
      --text-dim:     #64748b;
      --text-faint:   #94a3b8;

      --lime:         #1d4ed8;
      --lime-soft:    #3b82f6;
      --green:        #0a1a3a;
      --orange:       #1d4ed8;
      --orange-2:     #1e3a8a;

      --sans:    'Open Sans', system-ui, sans-serif;
      --display: 'Poppins', 'Open Sans', system-ui, sans-serif;
    }

    @keyframes pulseGlow { 0%,100% { opacity:.5; } 50% { opacity:1; } }
    @keyframes bubbleIn  { from { opacity:0; transform: translateY(12px) scale(.98); } to { opacity:1; transform: translateY(0) scale(1); } }
    @keyframes blink     { 0%,80%,100% { opacity:.25; transform: translateY(0); } 40% { opacity:1; transform: translateY(-3px); } }
    @keyframes barPulse  { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100svh;
      overflow-x: hidden;
      font-weight: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    html::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(at 20% 80%, #0a1a3a 1px, transparent 0);
      background-size: 3px 3px;
      pointer-events: none;
      opacity: .05;
      z-index: 1;
    }
    .bg-orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
    .orb-1 {
      width: 700px; height: 700px; top: -240px; right: -120px;
      background: radial-gradient(circle, rgba(29,78,216,.12), transparent 70%);
      animation: pulseGlow 8s ease-in-out infinite;
    }
    .orb-2 {
      width: 500px; height: 500px; bottom: 6%; left: -160px;
      background: radial-gradient(circle, rgba(10,26,58,.08), transparent 70%);
      animation: pulseGlow 12s ease-in-out infinite reverse;
    }

    /* ─── CHAT SHELL ─── */
    .chat {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 460px;
      height: min(760px, 92svh);
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(10,26,58,.16), 0 0 30px rgba(29,78,216,.08);
    }
    .chat-bar {
      height: 4px;
      background: linear-gradient(90deg, var(--lime), var(--lime-soft), var(--lime));
      background-size: 200% 100%;
      animation: barPulse 4s ease-in-out infinite;
    }

    /* header */
    .chat-head {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }
    .chat-logo-plate {
      height: 44px; width: 44px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, #0a1a3a, #1e3a8a);
      overflow: hidden;
    }
    .chat-logo-plate img { height: 30px; width: 30px; object-fit: contain; display: block; }
    .chat-logo-fallback { font-family: var(--display); font-size: 15px; font-weight: 800; color: #fff; line-height: 1; letter-spacing: .02em; }
    .chat-id { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .chat-name { font-family: var(--display); font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.1; }
    .chat-status { font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
    .chat-status b { color: #16a34a; font-weight: 600; }
    .chat-tag {
      margin-left: auto; flex-shrink: 0;
      font-size: 9px; letter-spacing: .12em; text-transform: uppercase; font-weight: 700;
      color: var(--lime); opacity: .9;
      border: 1px solid rgba(29,78,216,.3);
      background: rgba(29,78,216,.06);
      padding: 5px 10px; border-radius: 999px;
    }

    /* messages */
    .chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 22px 18px 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    .chat-log::-webkit-scrollbar { width: 6px; }
    .chat-log::-webkit-scrollbar-thumb { background: rgba(10,26,58,.14); border-radius: 999px; }

    .msg { display: flex; max-width: 84%; animation: bubbleIn .35s ease-out both; }
    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end; justify-content: flex-end; }
    .bubble {
      padding: 12px 16px;
      font-size: 14.5px;
      line-height: 1.55;
      border-radius: 18px;
    }
    .bubble strong { font-weight: 700; color: var(--text); }
    .msg.user .bubble strong { color: #fff; }
    .msg.bot .bubble {
      background: var(--bg-soft);
      border: 1px solid var(--line);
      color: var(--text);
      border-bottom-left-radius: 6px;
    }
    .msg.user .bubble {
      background: linear-gradient(92deg, var(--lime) 0%, var(--lime-soft) 100%);
      color: #fff;
      border-bottom-right-radius: 6px;
      box-shadow: 0 4px 14px rgba(29,78,216,.25);
    }

    /* typing indicator */
    .typing .bubble { display: flex; gap: 5px; padding: 15px 18px; }
    .typing .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); animation: blink 1.3s infinite; }
    .typing .dot:nth-child(2) { animation-delay: .18s; }
    .typing .dot:nth-child(3) { animation-delay: .36s; }

    /* footer / input zone */
    .chat-foot {
      border-top: 1px solid var(--line);
      padding: 14px 16px 16px;
      background: #f7f9fc;
    }

    /* quick reply chips */
    .msg.options { align-self: stretch; max-width: 100%; justify-content: flex-end; }
    .options-wrap {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: flex-end;
      width: 100%;
    }
    .chip {
      flex: 0 1 auto;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 18px;
      border: 1.5px solid rgba(29,78,216,.5);
      background: rgba(29,78,216,.08);
      color: var(--text);
      border-radius: 999px;
      font-family: var(--sans);
      font-size: 13.5px; font-weight: 600;
      cursor: pointer;
      transition: background .18s, border-color .18s, transform .12s, box-shadow .18s;
      white-space: nowrap;
    }
    .chip svg { width: 15px; height: 15px; stroke: var(--lime); fill: none; stroke-width: 2.2; }
    .chip:hover {
      background: rgba(29,78,216,.18);
      border-color: var(--lime);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(29,78,216,.22);
    }
    .chip:active { transform: scale(.97); }

    /* text input bar */
    .input-bar { display: flex; align-items: center; gap: 8px; }
    .input-bar.hidden { display: none; }
    .country-select {
      flex-shrink: 0;
      width: 84px;
      background: #ffffff;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      padding: 13px 8px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      text-align: center;
      outline: none;
      transition: border-color .2s;
    }
    .country-select.hidden { display: none; }
    .field {
      flex: 1;
      background: #ffffff;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      padding: 14px 18px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14.5px;
      outline: none;
      transition: border-color .2s;
    }
    .field::placeholder { color: var(--text-faint); }
    .field:focus { border-color: rgba(29,78,216,.5); }
    .send-btn {
      flex-shrink: 0;
      width: 48px; height: 48px;
      border: none;
      border-radius: 50%;
      background: radial-gradient(38.67% 91.17% at 50% 8.83%, var(--orange) 0, var(--orange-2) 100%);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 16px rgba(29,78,216,.4);
      transition: filter .2s, transform .12s;
    }
    .send-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2.2; }
    .send-btn:hover { filter: brightness(1.1); transform: scale(1.05); }
    .send-btn:active { transform: scale(.96); }

    .foot-secure {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      font-size: 11px; color: var(--text-faint);
      margin-top: 12px;
    }
    .foot-secure svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* highlight card */
    .vagas-card {
      border: 1px solid rgba(29,78,216,.3);
      background:
        radial-gradient(circle at 15% 0%, rgba(29,78,216,.10), transparent 60%),
        rgba(29,78,216,.04);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex; flex-direction: column; gap: 10px;
      margin-top: 2px;
    }
    .vagas-head { display: flex; align-items: center; gap: 9px; }
    .vagas-head svg { width: 17px; height: 17px; stroke: var(--lime); fill: none; stroke-width: 2; flex-shrink: 0; }
    .vagas-head b { font-family: var(--display); font-size: 14px; font-weight: 700; color: var(--text); }
    .vagas-text { font-size: 13.5px; line-height: 1.55; color: var(--text-mute); }
    .vagas-text strong { color: var(--text); font-weight: 600; }

    /* summary card (final) */
    .summary {
      border: 1px solid rgba(29,78,216,.3);
      background: rgba(29,78,216,.05);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex; flex-direction: column; gap: 10px;
      margin-top: 2px;
    }
    .summary-row { display: flex; align-items: center; gap: 11px; font-size: 13.5px; color: var(--text-mute); }
    .summary-row svg { width: 15px; height: 15px; stroke: var(--lime); fill: none; stroke-width: 2; flex-shrink: 0; }
    .summary-row b { color: var(--text); font-weight: 600; }

    @media (max-width: 520px) {
      body { padding: 0; }
      .chat { max-width: 100%; height: 100svh; border-radius: 0; border: none; }
    }
  </style>
</head>
<body>

  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="chat" role="dialog" aria-label="Atendimento Faculdade ITH">
    <div class="chat-bar"></div>

    <header class="chat-head">
      <div class="chat-logo-plate">
        <img src="https://pages.greatpages.com.br/faculdadeith.ithpos.com.br-pos-graduacao-enfermagem-obstetrica-01/1780283432/imagens/desktop/451211-5da5f1f85923920816f1394786670d22.png" alt="Faculdade ITH"
             onerror="this.outerHTML='<span class=&quot;chat-logo-fallback&quot;>ITH</span>'">
      </div>
      <div class="chat-id">
        <div class="chat-name">Faculdade ITH</div>
        <div class="chat-status"><b>● online</b> · responde na hora</div>

    </header>

    <div class="chat-log" id="log" aria-live="polite"></div>

    <footer class="chat-foot">
      <form class="input-bar hidden" id="inputBar" autocomplete="off">
        <select class="country-select hidden" id="country">
          <option value="55" selected>🇧🇷 +55</option>
          <option value="351">🇵🇹 +351</option>

        <input class="field" id="field" type="text" placeholder="Digite aqui…" aria-label="Sua resposta" />
        <button class="send-btn" id="send" type="submit" aria-label="Enviar">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </form>

      <div class="foot-secure">
        <i data-lucide="lock"></i>
        <span>Seus dados estão seguros</span>
      </div>

  </div>

  <script>
    lucide.createIcons();

    // Webhook Make.com — recebe os dados de captura do lead.
    const WEBHOOK_URL = 'https://hook.us1.make.com/b6skrg61kieeupv7e86kjgygkuy5yf96';

    // Discurso personalizado por objetivo — argumentos reais da página da Pós em UTI Neonatal e Pediátrica.
    const OBJETIVOS = {
      'renda': 'show! Profissionais com pós-graduação chegam a ter <strong>renda até 225% maior</strong> que os apenas graduados — com potencial de <strong>dobrar o salário em 12 meses</strong>. A média da área é de R$ 7.352/mês, chegando a R$ 15.499.',
      'pratica': 'adoro! Aqui a prática é levada a sério: <strong>vivências clínicas e práticas em 100% dos módulos presenciais</strong>, em laboratório de simulação realística com equipamentos de alta tecnologia hospitalar.',
      'destaque': 'massa! Você desenvolve um <strong>conhecimento prático que poucos possuem, mas com alta demanda no mercado</strong> — assumindo plantões em unidades de alta complexidade com segurança e se destacando dos demais profissionais.'
    };

    const log      = document.getElementById('log');
    const inputBar = document.getElementById('inputBar');
    const field    = document.getElementById('field');
    const country  = document.getElementById('country');

    const data = { perfil: '', objetivo: '', objetivo_label: '', nome: '', whatsapp: '', email: '' };

    const sleep = (ms) => new Promise(r => setTimeout(r, ms));
    const scrollDown = () => { log.scrollTop = log.scrollHeight; };

    function addUser(text) {
      const m = document.createElement('div');
      m.className = 'msg user';
      m.innerHTML = `<div class="bubble"></div>`;
      m.querySelector('.bubble').textContent = text;
      log.appendChild(m);
      scrollDown();
    }

    function addBotHTML(html) {
      const m = document.createElement('div');
      m.className = 'msg bot';
      m.innerHTML = `<div class="bubble">${html}</div>`;
      log.appendChild(m);
      lucide.createIcons();
      scrollDown();
    }

    async function botSay(html, delay = 750) {
      const t = document.createElement('div');
      t.className = 'msg bot typing';
      t.innerHTML = `<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
      log.appendChild(t);
      scrollDown();
      await sleep(delay);
      t.remove();
      addBotHTML(html);
    }

    function hideInputs() {
      inputBar.classList.add('hidden');
    }

    function showChips(options) {
      hideInputs();
      const m = document.createElement('div');
      m.className = 'msg options';
      const wrap = document.createElement('div');
      wrap.className = 'options-wrap';
      options.forEach(opt => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'chip';
        b.innerHTML = `<i data-lucide="${opt.icon}"></i>${opt.label}`;
        b.addEventListener('click', () => {
          m.remove();
          opt.onPick(opt.value, opt.label);
        });
        wrap.appendChild(b);
      });
      m.appendChild(wrap);
      log.appendChild(m);
      lucide.createIcons();
      scrollDown();
    }

    let activeHandler = null;
    let phoneMode = false;
    function showInput({ type = 'text', placeholder = 'Digite aqui…', phone = false, onSubmit }) {
      hideInputs();
      inputBar.classList.remove('hidden');
      field.type = type;
      field.placeholder = placeholder;
      field.value = '';
      field.inputMode = (type === 'tel') ? 'numeric' : (type === 'email' ? 'email' : 'text');
      country.classList.toggle('hidden', !phone);
      phoneMode = phone;
      activeHandler = onSubmit;
      setTimeout(() => field.focus(), 60);
      scrollDown();
    }

    inputBar.addEventListener('submit', (e) => {
      e.preventDefault();
      if (activeHandler) activeHandler(field.value.trim());
    });

    /* ─── máscara de telefone (BR) — (DD) 9 XXXX-XXXX ─── */
    function maskPhoneBR(v) {
      const d = v.replace(/\D/g, '').slice(0, 11);
      if (d.length <= 2) return d ? '(' + d : '';
      const ddd = d.slice(0, 2);
      const rest = d.slice(2);
      if (rest.length <= 8) {
        return rest.length <= 4
          ? `(${ddd}) ${rest}`
          : `(${ddd}) ${rest.slice(0, 4)}-${rest.slice(4)}`;
      }
      return `(${ddd}) ${rest.slice(0, 1)} ${rest.slice(1, 5)}-${rest.slice(5)}`;
    }
    field.addEventListener('input', () => {
      if (!phoneMode) return;
      field.value = (country.value === '55')
        ? maskPhoneBR(field.value)
        : field.value.replace(/[^\d\s()+-]/g, '');
    });
    country.addEventListener('change', () => {
      if (phoneMode) field.dispatchEvent(new Event('input'));
    });

    /* ─── validators ─── */
    const isEmail = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v);
    const phoneDigits = (v) => v.replace(/\D/g, '');

    /* ─── conversation flow ─── */
    async function start() {
      await botSay('Oi! 👋 Aqui é o time da <strong>Faculdade ITH</strong>.', 650);
      await botSay('Vou te ajudar a garantir sua vaga na <strong>Pós-Graduação em UTI Neonatal e Pediátrica</strong> — pra você assumir plantões em alta complexidade com segurança, com práticas em 100% dos módulos e certificada pelo MEC (Conceito 5). Leva menos de 1 minuto. 💜', 1300);
      await askPerfil();
    }

    async function askPerfil() {
      await botSay('Pra começar, me conta sua situação hoje: 👩‍⚕️', 850);
      showChips([
        { label: 'Enfermeiro(a) formado(a)', value: 'Enfermeiro(a) formado(a)', icon: 'badge-check', onPick: pickPerfil },
        { label: 'Fisioterapeuta',           value: 'Fisioterapeuta',           icon: 'activity',    onPick: pickPerfil },
        { label: 'Cursando / Técnico',       value: 'Cursando / Técnico',       icon: 'book-open',   onPick: pickPerfil },
      ]);
    }

    async function pickPerfil(value, label) {
      data.perfil = value;
      addUser(label);
      hideInputs();
      if (value === 'Enfermeiro(a) formado(a)') {
        await botSay('Perfeito — a pós tem módulos e práticas <strong>exclusivos pra enfermeiros</strong> (como PICC e Processo de Enfermagem), você está no lugar certo! 🙌', 850);
      } else if (value === 'Fisioterapeuta') {
        await botSay('Ótimo! Tem trilha <strong>exclusiva pra fisioterapeutas</strong> (fisioterapia cardiorrespiratória neo e pediátrica, mobilização precoce). Você se encaixa direitinho. 🙂', 850);
      } else {
        await botSay('Beleza! Já dá pra <strong>garantir sua vaga</strong> e nosso time confirma os pré-requisitos com você. 🎓', 850);
      }
      await askObjetivo();
    }

    async function askObjetivo() {
      await botSay('E o que mais pesa na sua decisão de se especializar?', 950);
      showChips([
        { label: 'Aumentar minha renda',  value: 'renda',    icon: 'trending-up', onPick: pickObjetivo },
        { label: 'Dominar a prática',     value: 'pratica',  icon: 'stethoscope', onPick: pickObjetivo },
        { label: 'Me destacar no mercado', value: 'destaque', icon: 'award',       onPick: pickObjetivo },
      ]);
    }

    async function pickObjetivo(value, label) {
      data.objetivo = value;
      data.objetivo_label = label;
      addUser(label);
      hideInputs();

      const blurb = OBJETIVOS[value] || 'ótima escolha! Nossa pós foi desenhada pra te dar prática real e destaque no mercado.';
      await botSay('Boa, ' + blurb, 1100);

      // card de turma / oportunidade
      const m = document.createElement('div');
      m.className = 'msg bot';
      m.innerHTML = `
        <div class="vagas-card">
          <div class="vagas-head"><i data-lucide="sparkles"></i><b>Super bônus de pré-abertura</b></div>
          <div class="vagas-text">Os <strong>10 primeiros inscritos</strong> garantem o <strong>Curso Completo de Marketing Digital</strong> (R$ 997) gratuito + <strong>bônus do curso de PICC</strong> e 6 meses de acesso extra. As vagas com bônus são limitadas — bora assegurar a sua?</div>
        </div>`;
      log.appendChild(m);
      lucide.createIcons();
      scrollDown();
      await sleep(450);

      await askNome();
    }

    async function askNome() {
      await botSay('Como você se chama? (nome completo)', 750);
      showInput({
        type: 'text',
        placeholder: 'Seu nome completo',
        onSubmit: async (v) => {
          if (v.replace(/\s/g, '').length < 3) {
            await botSay('Pode escrever seu nome completinho pra mim? 🙂', 600);
            return;
          }
          data.nome = v;
          addUser(v);
          hideInputs();
          const first = v.split(' ')[0];
          await botSay(`Prazer, <strong>${escapeHtml(first)}</strong>! 😄`, 650);
          await askWhats();
        }
      });
    }

    async function askWhats() {
      await botSay('Qual é o seu <strong>WhatsApp</strong>? É por ele que nosso time fala com você. 📲', 900);
      showInput({
        type: 'tel',
        phone: true,
        placeholder: '(DDD) 9 0000-0000',
        onSubmit: async (v) => {
          const digits = phoneDigits(v);
          if (digits.length < 8) {
            await botSay('Hmm, esse número parece incompleto. Pode conferir o DDD + número? 📞', 650);
            return;
          }
          data.whatsapp = '+' + country.value + digits;
          addUser('+' + country.value + ' ' + v);
          hideInputs();
          await botSay('Anotado! ✅', 600);
          await askEmail();
        }
      });
    }

    async function askEmail() {
      await botSay('E o seu melhor <strong>e-mail</strong>? Mando os detalhes da pós e dos bônus por lá também. ✉️', 900);
      showInput({
        type: 'email',
        placeholder: 'seu@email.com',
        onSubmit: async (v) => {
          if (!isEmail(v)) {
            await botSay('Esse e-mail não parece válido. Confere pra mim? 🙂', 650);
            return;
          }
          data.email = v;
          addUser(v);
          hideInputs();
          await finish();
        }
      });
    }

    async function finish() {
      await botSay('Prontinho! 🎉 É só conferir se está tudo certo:', 950);

      const m = document.createElement('div');
      m.className = 'msg bot';
      m.innerHTML = `
        <div class="summary">
          <div class="summary-row"><i data-lucide="user"></i><span><b>${escapeHtml(data.nome)}</b></span></div>
          <div class="summary-row"><i data-lucide="badge-check"></i><span>${escapeHtml(data.perfil)}</span></div>
          <div class="summary-row"><i data-lucide="target"></i><span>${escapeHtml(data.objetivo_label)}</span></div>
          <div class="summary-row"><i data-lucide="phone"></i><span>${escapeHtml(data.whatsapp)}</span></div>
          <div class="summary-row"><i data-lucide="mail"></i><span>${escapeHtml(data.email)}</span></div>
        </div>`;
      log.appendChild(m);
      lucide.createIcons();
      scrollDown();

      await botSay(`Nosso time já vai te chamar no WhatsApp com os detalhes da <strong>Pós em UTI Neonatal e Pediátrica</strong>, os <strong>bônus de pré-abertura</strong> e as condições de matrícula. Fica de olho! 💜`, 1300);

      // Meta Pixel — evento de Lead (usuário concluiu o preenchimento)
      if (window.fbq) {
        fbq('track', 'Lead', {
          content_name: 'Pós-Graduação em UTI Neonatal e Pediátrica',
          content_category: data.perfil
        });
      }

      await sendLead();
    }

    async function sendLead() {
      const telefone = phoneDigits(data.whatsapp);
      const params = new URLSearchParams(location.search);
      const utm = (k) => (params.get(k) || '').trim();

      const payload = {
        'Nome': data.nome,
        'Telefone': telefone,
        'Email': data.email,
        'Formação': data.perfil + ' · Objetivo: ' + data.objetivo_label,
        'Região': '',
        'utm_source': utm('utm_source') || 'lp-chat',
        'utm_medium': utm('utm_medium') || 'chat',
        'utm_campaign': utm('utm_campaign') || 'uti-neonatal-pediatrica',
        'utm_content': utm('utm_content')
      };
      try {
        if (WEBHOOK_URL) {
          await fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
        } else {
          console.log('Lead (configure WEBHOOK_URL):', payload);
        }
      } catch (err) {
        console.error('Webhook error:', err);
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => (
        { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
      ));
    }

    start();
  </script>

</body>
</html>
